name: ALL STAGE CI/CD

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Project name (e.g., rahat-project-triggers)'
        required: true
        default: 'rahat-project-triggers'
      environment:
        description: 'Deployment environment (e.g., stage, prod)'
        required: true
        default: 'stage'
      manifest_file:
        description: 'Path to Kubernetes manifest file'
        required: true
        default: 'K8s-Manifest/Rahat/AA-Stage/Argo-Rollout/project-trigger.yaml'

env:
  CI: false

jobs:
  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Import Docker Secrets from Vault
        uses: hashicorp/vault-action@v2.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/docker/${{ github.actor }} username | DOCKERHUB_USERNAME ;
            github/data/general/docker/${{ github.actor }} password | DOCKERHUB_TOKEN ;

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker Image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ github.event.inputs.project_name }}
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ github.actor }}/${{ github.event.inputs.project_name }}:${{ github.event.inputs.environment }}
            ${{ github.actor }}/${{ github.event.inputs.project_name }}:${{ github.event.inputs.environment }}-${{ steps.vars.outputs.sha_short }}

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}

  update-manifest:
    name: Update Kubernetes Manifest
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Import Manifest Repo Secrets
        uses: hashicorp/vault-action@v2.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/Stage-Manifest repo | MANIFEST_REPO ;
            github/data/general/Stage-Manifest ssh-key | SSH_KEY ;

      - name: Checkout Stage Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO }}
          ssh-key: ${{ env.SSH_KEY }}

      - name: Update Image Tag in Manifest
        run: |
          sed -i "s|image: .*|image: ${{ github.actor }}/${{ github.event.inputs.project_name }}:${{ github.event.inputs.environment }}-${{ needs.deploy.outputs.sha_short }}|" ${{ github.event.inputs.manifest_file }}

      - name: Commit & Push Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ${{ github.event.inputs.manifest_file }}
          git commit -m "ci: Update ${{ github.event.inputs.project_name }} image tag to ${{ github.event.inputs.environment }}-${{ needs.deploy.outputs.sha_short }}"
          git push origin main
