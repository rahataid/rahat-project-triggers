name: UNICEF Dev CI/CD
on:
  push:
    branches:
      - "unicef-evm-dev"
    paths:
      - "apps/triggers/**"
      - "packages/**"
  pull_request:
    branches:
      - "unicef-evm-dev"
    paths:
      - "apps/triggers/**"
      - "packages/**"
  workflow_dispatch:

env:
  CI: false

jobs:
  deploy:
    name: build && push image to Docker hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA and short Run ID
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "run_id_short=${GITHUB_RUN_ID:0:3}" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.14.1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.10.0"
          cache: "pnpm"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies and build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @lib/database db:generate
          pnpm turbo build --filter=triggers...

      - name: Import Secrets
        uses: hashicorp/vault-action@v2.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/docker/esatya username | DOCKERHUB_USERNAME ;
            github/data/general/docker/esatya password | DOCKERHUB_TOKEN ;

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build && push events-app
        id: build-push-events-app
        uses: docker/build-push-action@v5
        with:
          context: .
          File: apps/triggers/Dockerfile.triggers
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: |
            esatya/rahat-project-triggers:unicef-evm-dev
            esatya/rahat-project-triggers:unicef-evm-dev-${{ steps.vars.outputs.sha_short }}-${{ steps.vars.outputs.run_id_short }}
          cache-from: type=registry,ref=esatya/rahat-project-triggers:unicef-evm-dev
          cache-to: type=inline

      - name: Image digest
        run: echo ${{ steps.build-push-triggers.outputs.digest }}

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      run_id_short: ${{ steps.vars.outputs.run_id_short }}
      image_tag: esatya/rahat-project-triggers:dev-${{ steps.vars.outputs.sha_short }}-${{ steps.vars.outputs.run_id_short }}
