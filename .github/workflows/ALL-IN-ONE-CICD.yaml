name: ALL-IN-ONE CICD

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
    outputs:
      image_digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.image_digest }}

env:
  CI: false
  PNPM_VERSION: '8.14.1'
  NODE_VERSION: '20.10.0'

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate database & build
        run: |
          pnpm --filter @lib/database db:generate
          pnpm turbo build --filter=triggers

      - name: Import Docker credentials from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/docker/esatya username | DOCKERHUB_USERNAME ;
            github/data/general/docker/esatya password | DOCKERHUB_TOKEN ;

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.vault.outputs.DOCKERHUB_USERNAME }}
          password: ${{ steps.vault.outputs.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          provenance: false
          sbom: false

          tags: |
            esatya/${{ inputs.image_name }}:test-load

          cache-from: |
            type=registry,ref=esatya/${{ inputs.image_name }}:test-load
            type=registry,ref=esatya/${{ inputs.image_name }}:buildcache

          cache-to: |
            type=registry,ref=esatya/${{ inputs.image_name }}:buildcache,mode=max

      - name: Output build info
        run: |
          echo "Pushed Tag : esatya/${{ inputs.image_name }}:test-load"
          echo "Digest     : ${{ steps.build.outputs.digest }}"
