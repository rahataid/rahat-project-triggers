name: Core CI/CD

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
    outputs:
      sha_short:
        description: "Short SHA of the commit"
        value: ${{ jobs.deploy.outputs.sha_short }}
      image_tag:
        description: "Full versioned image tag"
        value: ${{ jobs.deploy.outputs.image_tag }}
      image_digest:
        description: "Image digest"
        value: ${{ jobs.deploy.outputs.image_digest }}

env:
  CI: false
  PNPM_VERSION: '8.14.1'
  NODE_VERSION: '20.10.0'

jobs:
  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get short SHA
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          RUN_ID_SHORT=${GITHUB_RUN_ID: -4}
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "image_tag=${SHA_SHORT}-${RUN_ID_SHORT}" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js with caching
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate database and build
        run: |
          pnpm --filter @lib/database db:generate
          pnpm turbo build --filter=triggers

      - name: Import Secrets from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/docker/esatya username | DOCKERHUB_USERNAME ;
            github/data/general/docker/esatya password | DOCKERHUB_TOKEN ;

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.vault.outputs.DOCKERHUB_USERNAME }}
          password: ${{ steps.vault.outputs.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Build and Push Docker Image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            esatya/${{ inputs.image_name }}:${{ inputs.tag_prefix }}
            esatya/${{ inputs.image_name }}:${{ inputs.tag_prefix }}-${{ steps.vars.outputs.image_tag }}
          cache-from: |
            type=registry,ref=esatya/${{ inputs.image_name }}:${{ inputs.tag_prefix }}
            type=registry,ref=esatya/${{ inputs.image_name }}:buildcache
          cache-to: type=registry,ref=esatya/${{ inputs.image_name }}:buildcache,mode=max
          provenance: false
          sbom: false

      - name: Output build information
        run: |
          echo "✅ Stable Tag : esatya/${{ inputs.image_name }}:${{ inputs.tag_prefix }}"
          echo "✅ Versioned Tag: esatya/${{ inputs.image_name }}:${{ inputs.tag_prefix }}-${{ steps.vars.outputs.image_tag }}"
          echo "✅ Digest: ${{ steps.build-push.outputs.digest }}"

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      image_tag: esatya/${{ inputs.image_name }}:${{ inputs.tag_prefix }}-${{ steps.vars.outputs.image_tag }}
      image_digest: ${{ steps.build-push.outputs.digest }}
